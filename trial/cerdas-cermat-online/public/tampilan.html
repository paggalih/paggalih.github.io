<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tampilan — Cerdas Cermat Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #080c16;
      --surface: #0f1526;
      --border: #1c2640;
      --text: #eef1f8;
      --muted: #5d6f9a;
      --accent: #4f7cff;
      --accent2: #7c5cfc;
      --gold: #f5c542;
      --green: #2dd4a0;
      --red: #f05a5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .h-left {
      display: flex; align-items: center; gap: 14px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; color: var(--gold);
      letter-spacing: 3px;
    }
    .round-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; padding: 5px 18px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    }

    /* Scoreboard strip */
    .score-strip {
      display: flex; gap: 8px; padding: 10px 28px;
      background: rgba(15,21,38,0.8);
      flex-shrink: 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    .sc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      text-align: center;
      min-width: 100px;
      transition: all 0.3s;
    }
    .sc-card.active {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(245,197,66,0.2);
    }
    .sc-card.buzzer-winner {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(45,212,160,0.3);
      animation: winPulse 1s 3;
    }
    @keyframes winPulse {
      0%,100% { box-shadow: 0 0 20px rgba(45,212,160,0.3); }
      50% { box-shadow: 0 0 35px rgba(45,212,160,0.5); }
    }
    .sc-name {
      font-size: 0.82rem; font-weight: 800;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 120px;
    }
    .sc-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; color: var(--gold);
      line-height: 1.1; letter-spacing: 1px;
    }
    .sc-score.neg { color: var(--red); }

    /* Main content */
    .content {
      flex: 1; display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
      min-height: 0;
      position: relative;
    }

    /* Waiting state */
    .waiting {
      text-align: center;
    }
    .waiting h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem; color: var(--gold);
      letter-spacing: 3px; margin-bottom: 12px;
    }
    .waiting p { color: var(--muted); font-size: 1.2rem; }

    /* Timer */
    .timer-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 18vh, 14rem);
      line-height: 1; color: var(--text);
      letter-spacing: 6px;
      text-shadow: 0 0 60px rgba(255,255,255,0.08);
      transition: color 0.3s;
      flex-shrink: 0;
    }
    .timer-display.critical {
      color: var(--red);
      animation: pulse 0.8s infinite;
      text-shadow: 0 0 60px rgba(240,90,90,0.4);
    }
    .timer-display.done { color: var(--muted); }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

    /* Question */
    .question-display {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      overflow-y: auto; padding: 12px 0;
      width: 100%; max-width: 900px;
    }
    .q-text {
      font-size: clamp(1.6rem, 4vh, 3.2rem);
      font-weight: 700; text-align: center;
      line-height: 1.5; white-space: pre-wrap;
    }

    /* Answer */
    .answer-display {
      background: rgba(245,197,66,0.1);
      border: 2px solid rgba(245,197,66,0.3);
      border-radius: 12px;
      padding: 16px 28px;
      color: var(--gold);
      font-size: 1.4rem; font-weight: 800;
      text-align: center;
      white-space: pre-wrap;
      flex-shrink: 0;
      max-width: 800px;
      width: 100%;
    }
    .answer-display.hidden { display: none; }

    /* Buzzer winner banner */
    .buzzer-banner {
      display: none;
      background: rgba(45,212,160,0.1);
      border: 2px solid var(--green);
      border-radius: 12px;
      padding: 16px 28px;
      text-align: center;
      font-size: 1.4rem; font-weight: 900;
      color: var(--green);
      margin-bottom: 10px;
      animation: buzzAnim 0.5s ease;
    }
    .buzzer-banner.show { display: block; }
    @keyframes buzzAnim {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Flash */
    .flash-overlay {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none; opacity: 0;
      border: 8px solid var(--accent2);
      border-radius: 4px;
    }
    .flash-overlay.show { opacity: 1; animation: flashOut 0.8s forwards; }
    @keyframes flashOut { 0%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="h-left">
      <span class="logo">🏆 CERDAS CERMAT ONLINE</span>
      <span class="round-badge" id="roundBadge">BABAK WAJIB</span>
    </div>
  </div>

  <!-- SCORE STRIP -->
  <div class="score-strip" id="scoreStrip"></div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="waiting" id="waitingView">
      <h2>CERDAS CERMAT</h2>
      <p>Menunggu pertandingan dimulai...</p>
    </div>

    <div id="questionView" style="display:none;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;">
      <div class="timer-display" id="timerDisplay">15</div>

      <div class="buzzer-banner" id="buzzerBanner">
        🔔 <span id="buzzerWinnerText">—</span>
      </div>

      <div class="question-display">
        <div class="q-text" id="qText"></div>
      </div>

      <div class="answer-display hidden" id="answerDisplay">
        <span style="opacity:0.6;font-size:0.9rem">JAWABAN:</span><br>
        <span id="answerText"></span>
      </div>
    </div>
  </div>

  <div class="flash-overlay" id="flashOverlay"></div>

<script>
const socket = io({ query: { role: 'tampilan' } });
let S = {};

socket.on('state:update', (s) => {
  S = s;
  render();
});

socket.on('buzzer:winner', ({ teamName }) => {
  flash();
});

socket.on('timer:end', () => {
  // visual cue handled by timer display
});

function render() {
  if (!S.teams) return;

  document.getElementById('roundBadge').textContent = S.roundBadge || 'WAJIB';

  // Score strip
  const strip = document.getElementById('scoreStrip');
  strip.innerHTML = '';
  S.teams.forEach(t => {
    const score = S.scores[t.id] || 0;
    const isActive = S.activeTeam === t.id;
    const isBuzzerWinner = S.buzzerWinner === t.id;
    let cls = 'sc-card';
    if (isBuzzerWinner) cls += ' buzzer-winner';
    else if (isActive) cls += ' active';

    strip.innerHTML += `
      <div class="${cls}">
        <div class="sc-name">${t.name}</div>
        <div class="sc-score ${score < 0 ? 'neg' : ''}">${score}</div>
      </div>`;
  });

  // Content
  const waiting = document.getElementById('waitingView');
  const qView = document.getElementById('questionView');

  if (S.phase === 'question' && S.currentQuestion) {
    waiting.style.display = 'none';
    qView.style.display = '';

    // Timer
    const td = document.getElementById('timerDisplay');
    td.textContent = S.timeLeft < 10 ? '0' + S.timeLeft : S.timeLeft;
    td.classList.toggle('critical', S.timeLeft <= 5 && S.timeLeft > 0);
    td.classList.toggle('done', S.timeLeft <= 0);

    // Question
    document.getElementById('qText').innerHTML = S.currentQuestion.q.replace(/\n/g, '<br>');

    // Answer
    const ad = document.getElementById('answerDisplay');
    ad.classList.toggle('hidden', !S.showAnswer);
    document.getElementById('answerText').innerHTML = S.currentQuestion.a.replace(/\n/g, '<br>');

    // Buzzer banner
    const bb = document.getElementById('buzzerBanner');
    if (S.buzzerWinner) {
      const wn = S.teams.find(t => t.id === S.buzzerWinner);
      document.getElementById('buzzerWinnerText').textContent = wn ? wn.name : '?';
      bb.classList.add('show');
    } else {
      bb.classList.remove('show');
    }
  } else {
    waiting.style.display = '';
    qView.style.display = 'none';
  }
}

function flash() {
  const el = document.getElementById('flashOverlay');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
</script>
</body>
</html>
