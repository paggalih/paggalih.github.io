  .controls {

    align-items: center;

  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--amber); }

  /* ── TABLE ── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: auto;
    max-height: calc(100vh - 230px);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #141824;

  th {

    text-transform: uppercase;

    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }

  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--amber); }
  th.sort-asc::after  { content: ' ↑'; color: var(--amber); }
  th.sort-desc::after { content: ' ↓'; color: var(--amber); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;

  tbody tr:last-child { border-bottom: none; }

  td {

  .td-num {

  .td-oil  { color: #f0c060; }
  .td-dxy  { color: var(--blue); }
  .td-vix  { color: var(--red); }
  .td-na   { color: var(--muted); }

  /* ── TRUMP STATEMENT CELL ── */
  .trump-cell { min-width: 280px; max-width: 480px; }

  .trump-input {
    width: 100%;

    border: 1px solid transparent;

    font-size: 12px;
    padding: 4px 8px;
    border-radius: 3px;
    outline: none;
    transition: border-color .15s, background .15s;
    resize: none;
    height: 28px;
    overflow: hidden;
    white-space: nowrap;
  }

  .trump-input:focus {
    border-color: var(--amber);
    background: rgba(240,165,0,.05);
    height: auto;
    white-space: normal;
    overflow: visible;
  }

  .trump-input:not(:placeholder-shown) { border-color: var(--muted); }

  /* ── SKELETON ── */
  .skeleton-row td { padding: 10px 16px; }

  .skel {
    height: 14px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--dim);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state p { font-size: 12px; line-height: 1.8; }

  /* ── SAVE TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    pointer-events: none;
    letter-spacing: 0.5px;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--red); color: var(--red); }
</style>

<div id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let allRows = [];         // full dataset
let filteredRows = [];    // after search filter
let sortKey = 'date';
let sortDir = -1;         // -1 = desc
let dirty = false;        // unsaved trump edits

// ── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setStatus('loading', 'Fetching data…');
  google.script.run
    .withSuccessHandler(onDataLoaded)
    .withFailureHandler(onError)
    .getOrFetchData();
});

// ── DATA LOADED ───────────────────────────────────────────────────────────────
function onDataLoaded(rows) {
  allRows = rows || [];
  filteredRows = [...allRows];
  render();
  updateTicker();
  setStatus('success', `${allRows.length} rows loaded`);
  document.getElementById('btn-refresh').disabled = false;
  document.getElementById('btn-save').disabled = false;
  document.getElementById('search-input').disabled = false;
  document.getElementById('row-count').textContent = `${allRows.length} rows`;
}

// ── RENDER TABLE ─────────────────────────────────────────────────────────────
function render() {
  const tbody = document.getElementById('tbody');

  if (filteredRows.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="icon">◌</div>
          <p>No data available.<br>Check your API keys in code.gs and try Refresh.</p>
        </div>
      </td></tr>`;
    return;
  }

  // Sort
  const sorted = [...filteredRows].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av === '' || av === null || av === undefined) av = sortDir > 0 ? Infinity : -Infinity;
    if (bv === '' || bv === null || bv === undefined) bv = sortDir > 0 ? Infinity : -Infinity;
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });

  tbody.innerHTML = sorted.map(row => {
    const oil = fmtNum(row.oil);
    const dxy = fmtNum(row.dxy);
    const vix = fmtNum(row.vix);
    const trump = escHtml(row.trump || '');
    return `
    <tr data-date="${escHtml(row.date)}">
      <td class="td-date">${row.date}</td>
      <td class="td-num ${oil === '—' ? 'td-na' : 'td-oil'}">${oil}</td>
      <td class="td-num ${dxy === '—' ? 'td-na' : 'td-dxy'}">${dxy}</td>
      <td class="td-num ${vix === '—' ? 'td-na' : 'td-vix'}">${vix}</td>
      <td class="trump-cell">
        <textarea class="trump-input"
          data-date="${escHtml(row.date)}"
          placeholder="Add Trump statement…"
          oninput="onTrumpEdit(this)"
          rows="1">${trump}</textarea>
      </td>
    </tr>`;
  }).join('');

  // Update sort indicators
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
}

// ── TICKER ────────────────────────────────────────────────────────────────────
function updateTicker() {
  if (allRows.length === 0) return;
  const latest = allRows.reduce((a, b) => a.date > b.date ? a : b);

  setTick('tick-oil',  latest.oil,  2, '$');
  setTick('tick-dxy',  latest.dxy,  2, '');
  setTick('tick-vix',  latest.vix,  2, '');
  document.getElementById('tick-date').textContent = latest.date || '—';
  document.getElementById('tick-date').classList.remove('na');
}

function setTick(id, val, dec, prefix) {
  const el = document.getElementById(id);
  if (val === '' || val === null || val === undefined) {
    el.textContent = '—';
    el.className = 'ticker-value na';
  } else {
    el.textContent = prefix + parseFloat(val).toFixed(dec);
    el.className = 'ticker-value';
  }
}

// ── TRUMP EDIT ────────────────────────────────────────────────────────────────
function onTrumpEdit(el) {
  const date = el.dataset.date;
  const val  = el.value;
  const row  = allRows.find(r => r.date === date);
  if (row) row.trump = val;
  dirty = true;
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = key === 'date' ? -1 : -1; }
  render();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(q) {
  const term = q.trim().toLowerCase();
  filteredRows = term
    ? allRows.filter(r =>
        r.date.toLowerCase().includes(term) ||
        (r.trump || '').toLowerCase().includes(term))
    : [...allRows];
  document.getElementById('row-count').textContent =
    `${filteredRows.length} / ${allRows.length} rows`;
  render();
}

// ── REFRESH (re-fetch APIs) ───────────────────────────────────────────────────
function onRefresh() {
  if (dirty) {
    if (!confirm('You have unsaved Trump statements. Refresh anyway?')) return;
  }
  setStatus('loading', 'Re-fetching from APIs…');
  document.getElementById('btn-refresh').disabled = true;
  document.getElementById('btn-save').disabled = true;
  document.getElementById('search-input').disabled = true;

  google.script.run
    .withSuccessHandler(rows => {
      onDataLoaded(rows);
      showToast('Data refreshed from APIs.');
    })
    .withFailureHandler(onError)
    .refreshData();
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
function onSave() {
  const updates = allRows.map(r => ({ date: r.date, trump: r.trump || '' }));
  setStatus('loading', 'Saving…');
  document.getElementById('btn-save').disabled = true;

  google.script.run
    .withSuccessHandler(res => {
      setStatus('success', 'Saved.');
      showToast(res.msg || 'Saved successfully.');
      dirty = false;
      document.getElementById('btn-save').disabled = false;
    })
    .withFailureHandler(err => {
      onError(err);
      document.getElementById('btn-save').disabled = false;
    })
    .saveTrumpStatements(updates);
}

// ── ERROR ─────────────────────────────────────────────────────────────────────
function onError(err) {
  const msg = err && err.message ? err.message : String(err);
  setStatus('error', 'Error: ' + msg);
  showToast('Error: ' + msg, true);
  document.getElementById('btn-refresh').disabled = false;
  document.getElementById('btn-save').disabled = false;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtNum(v) {
  if (v === '' || v === null || v === undefined) return '—';
  return parseFloat(v).toFixed(2);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setStatus(cls, msg) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = cls;
}

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});
</script>
