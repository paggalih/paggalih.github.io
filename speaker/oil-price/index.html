<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { 
      font-family: sans-serif; 
      padding: 20px; 
    }
    table { 
      border-collapse: collapse; 
      width: 100%; 
    }
    th, td { 
      border: 1px solid black; 
      padding: 8px; 
      text-align: left; 
    }
    input[type="text"] {
      width: 90%;
    }
  </style>
</head>
<body>
  <h2>Market Data Tracker</h2>
  <div id="status">Loading fresh data...</div>
  <table id="dataTable"></table>

  <script>
    // Request data on load
    google.script.run.withSuccessHandler(renderTable).getLatestData();

    // Build the HTML table
    function renderTable(data) {
      document.getElementById('status').innerText = '';
      let html = '<tr>';
      
      // Build headers
      data[0].forEach(header => html += `<th>${header}</th>`);
      html += '<th>Action</th></tr>';

      // Build data rows
      for (let i = 1; i < data.length; i++) {
        html += '<tr>';
        html += `<td>${data[i][0]}</td>`;
        html += `<td>${data[i][1]}</td>`;
        html += `<td>${data[i][2]}</td>`;
        html += `<td>${data[i][3]}</td>`;
        
        let statement = data[i][4];
        let inputId = `stmt_${i}`;
        
        // Input and button cells
        html += `<td><input type="text" id="${inputId}" value="${statement}"></td>`;
        html += `<td><button onclick="saveData('${data[i][0]}', '${inputId}')">Save</button></td>`;
        html += '</tr>';
      }
      document.getElementById('dataTable').innerHTML = html;
    }

    // Send data to backend
    function saveData(date, inputId) {
      let val = document.getElementById(inputId).value;
      document.getElementById('status').innerText = 'Saving data...';
      
      google.script.run.withSuccessHandler(res => {
        document.getElementById('status').innerText = res;
      }).saveStatement(date, val);
    }
  </script>
</body>
</html>
